name: "Copilot Setup Steps"

# Run automatically when this file changes, and allow manual dispatch for validation.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify project-planning-agent skill files are present
        run: |
          SKILL_DIR="ai-automation/skills/project-planning-agent"

          echo "=== Project Planning Agent Skill — File Manifest ==="

          # Core skill definition
          echo ""
          echo "--- Core ---"
          ls -1 "$SKILL_DIR/SKILL.md"

          # Instructions
          echo ""
          echo "--- Instructions ---"
          ls -1 "$SKILL_DIR/instructions/"

          # Agents
          echo ""
          echo "--- Agents ---"
          ls -1 "$SKILL_DIR/agents/"

          # References
          echo ""
          echo "--- References ---"
          ls -1 "$SKILL_DIR/references/"

          # Assets
          echo ""
          echo "--- Assets ---"
          ls -1 "$SKILL_DIR/assets/"

          # Scripts
          echo ""
          echo "--- Scripts ---"
          ls -1 "$SKILL_DIR/scripts/"

          # Templates (all subdirectories)
          echo ""
          echo "--- Templates ---"
          find "$SKILL_DIR/templates" -type f | sort

          # Evals
          echo ""
          echo "--- Evals ---"
          ls -1 "$SKILL_DIR/evals/"

          echo ""
          echo "=== All skill files verified ==="

      - name: Make skill scripts executable and run a smoke test
        run: |
          SCRIPT_DIR="ai-automation/skills/project-planning-agent/scripts"
          chmod +x "$SCRIPT_DIR/validate_docs.py" "$SCRIPT_DIR/check_gates.py"
          echo "Scripts are ready. Usage:"
          echo "  python $SCRIPT_DIR/validate_docs.py <project_docs_dir>"
          echo "  python $SCRIPT_DIR/check_gates.py  <project_docs_dir>"
          python "$SCRIPT_DIR/validate_docs.py" --help 2>/dev/null || true
